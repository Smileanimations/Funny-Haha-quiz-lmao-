<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Unnamed Guessing Game</title>
    <script src="script.js" type="module" defer></script>
</head>
<body>
    <div id="maindiv" class="min-h-screen flex flex-col items-center bg-gray-800 text-white">
        <header class="w-full bg-gray-900 p-4 text-2xl flex justify-between">
            <div class="flex justify-center">
                <h1 class="text-white">Monster Hunter Guessing Game</h1>
            </div>
            <div class="space-x-4 items-center">
                <a href="/" class="text-gray-300 hover:text-white underline underline-offset-2">Guess the Monster</a>
                <a href="/masterhunter" class="text-gray-300 hover:text-white">Master Hunter</a>
                <a href="/statistics" class="text-gray-300 hover:text-white">Statistics</a>
                <a href="#" class="text-gray-300 hover:text-white">About</a>
            </div>
        </header>
        <div id="statistics" class="flex flex-row items-start justify-center gap-6 w-full mt-10">
            <div id="last-games-list" class="flex-1 bg-purple-0 rounded-md bg-clip-padding backdrop-filter backdrop-blur-xl bg-opacity-10 border border-gray-100 shadow-lg p-5">
                <h1 class="text-white text-2xl font-bold">Last Games Played</h1>
                <div id="games-container">
                    <!-- Game entries will be dynamically added here -->
                </div>
            </div>
            <div id="general-statistics" class="flex-1 flex flex-col gap-6">
                <div id="square-attempts" class="bg-purple-0 rounded-md bg-clip-padding backdrop-filter backdrop-blur-xl bg-opacity-10 border border-gray-100 shadow-lg grid grid-cols-3 items-center justify-center p-5">
                    <div class="mb-6 flex flex-col items-center">
                        <h1 id="total-attempts" class="text-white text-2xl font-bold">Attempts_Number</h1>
                        <h4 class="font-bold text-l">Total Attempts</h4>
                    </div>
                    <div class="mb-5 flex flex-col items-center">
                        <h1 id="average-attempts" class="text-white text-2xl font-bold">Average_Attempts</h1>
                        <h4 class="font-bold text-l">Average Attempts</h4>
                    </div>
                                        <div class="mb-6 flex flex-col items-center">
                        <h1 id="total-games" class="text-white text-2xl font-bold">Games_Number</h1>
                        <h4 class="font-bold text-l">Total Games</h4>
                    </div>
                    <div class="mb-6 flex flex-col items-center">
                        <h1 id="average-win" class="text-white text-2xl font-bold">Average_Win_Rate</h1>
                        <h4 class="font-bold text-l">Average Win Rate</h4>
                    </div>
                    <div class="mb-6 flex flex-col items-center">
                        <h1 id="total-wins" class="text-white text-2xl font-bold">Total_Wins</h1>
                        <h4 class="font-bold text-l">Total Wins</h4>
                    </div>
                    <div class="mb-6 flex flex-col items-center">
                        <h1 id="total-losses" class="text-white text-2xl font-bold">Total_Losses</h1>
                        <h4 class="font-bold text-l">Total Losses</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
