<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Monster Hunter Guessing Game</title>
    <script src="./indexeddb.js" type="module" defer></script>
    <script src="./models/statsModel.js" type="module" defer></script>
    <script src="./models/gamesModel.js" type="module" defer></script>
    <script src="./models/monstersGuessedModel.js" type="module" defer></script>
    <script src="./models/filterModel.js" type="module" defer></script>
    <script src="./script.js" type="module" defer></script>
</head>
<body id="body" class="">
    <div id="maindiv" class="min-h-screen flex flex-col items-center bg-gray-800 text-white">
        <header class="w-full bg-gray-900 p-4 text-2xl flex justify-between">
            <div class="flex justify-center">
                <h1 class="text-white">Monstie Guesser</h1>
            </div>
            <div class="space-x-4 items-center">
                <a href="/" class="text-gray-300 hover:text-white underline underline-offset-2">Guess the Monster</a>
                <a href="/masterhunter" class="text-gray-300 hover:text-white">Master Hunter</a>
                <a href="/statistics" class="text-gray-300 hover:text-white">Statistics</a>
                <a href="/about" class="text-gray-300 hover:text-white">About</a>
            </div>
        </header>
        <main  id="mainscreen" class="flex flex-1 flex-col items-center space-y-6">
            <h1 class="text-4xl font-bold">Guess the Monster!</h1>
            <div id="search-bar-div">
                <input id="search-bar" type="text" placeholder="Your Guess..." class="p-3 ps-10 rounded-lg bg-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 justify-center align items-center" />
                <div id="result" class="left-1/2 -translate-x-1/2 grid grid-row-5 absolute border-0 border-white rounded-lg bg-white p-1 mt-2 z-10"></div>
            </div>
            <div id="filter-div" class="relative group inline-block">
                <button id="filterbutton" onclick="instanceFilterMenu()" class="border border-gray-600 rounded-full text-lg px-6 py-3 mx-2 hover:bg-gray-700">Filter</button>
            </div>
            <button id="resetbutton">Give Up</button>
            <p id="attempts" class="font-bold">Attempts:</p>
            <div id="guessbackground" class="mt-8 flex flex-col items-center bg-gray-700 p-6 rounded-lg shadow-lg">
                <div id="guesses" class="flex flex-col items-center space-y-4"></div>
            </div>
        </main>
        <footer class="w-full bg-gray-900 p-4">
            <div class="flex justify-between">
                <p class="">Made by Mark | Smileanimations on <a href="https://github.com/Smileanimations" class="underline underline-offset-2">Github</a></p>
                <p class="">Project not affiliated with Capcom or Monster Hunter. All rights belong to ©CAPCOM CO., LTD.</p>
            </div>
        </footer>
    </div>
</body>
</html>
