<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Unnamed Guessing Game</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="">

    <div id="maindiv" class="min-h-screen flex flex-col items-center bg-gray-800 text-white">
        <header class="w-full bg-gray-900 p-4 text-center text-2xl">
            Monster Hunter Guessing Game
        </header>

        <main id="mainscreen" class="flex flex-1 flex-col items-center justify-center space-y-6">
            <h1 class="text-4xl font-bold">Guess the Monster!</h1>

            <div id="search-bar-div" class="flex flex-col items-center space-y-4 w-full max-w-md">
                <input
                    id="search-bar"
                    type="text"
                    placeholder="Your Guess..."
                    class="p-3 ps-10 rounded-lg bg-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 w-full"
                />
                <button id="Giveup" class="bg-red-700 rounded-lg text-center px-4 py-2 hover:bg-red-600 font-bold">
                    Give up
                </button>
                <div id="result" class="w-full"></div>
            </div>
        
            <p id="attempts" class="font-bold">Attempts:</p>
        
            <div id="guessbackground" class="flex flex-col items-center bg-gray-800 p-6 rounded-lg shadow-lg w-full max-w-md space-y-4">
                <div id="guesses" class="flex flex-wrap justify-center gap-4 w-full">
                </div>
            </div>
        </main>

        <footer style="z-index: 2;" class="bg-gray-900 w-full p-4 text-center">
            <p>© 2024 Monster Guess Game</p>
        </footer>
    </div>

</body>
</html>
